<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-config="seo.titleTemplate" data-placeholder="projects.title">Проекты | Северный Инжиниринг</title>
  <meta name="description" content="Реализованные проекты строительства и инженерии в Вологде и области.">
  <meta property="og:title" content="Проекты | Северный Инжиниринг">
  <meta property="og:description" content="Реализованные проекты строительства и инженерии.">
  <meta property="og:image" data-config="seo.ogImage">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏗️</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header id="site-header"></header>

  <main>
    <section class="section page-hero">
      <div class="container">
        <h1 class="page-title" data-splitting>Наши проекты</h1>
        <p class="page-subtitle">От идеи до сдачи объекта</p>
      </div>
    </section>

    <section class="section projects-grid" id="projects-grid">
      <div class="container">
        <div class="projects-filter">
          <button class="filter-btn active" data-filter="all">Все</button>
          <button class="filter-btn" data-filter="building">Строительство</button>
          <button class="filter-btn" data-filter="finishing">Отделка</button>
          <button class="filter-btn" data-filter="lowcurrent">Слаботочка</button>
          <button class="filter-btn" data-filter="energy">Энергетика</button>
        </div>
        <div class="projects-list" id="projects-list"></div>
      </div>
    </section>
  </main>

  <footer id="site-footer"></footer>

  <!-- Модальное окно проекта -->
  <div class="modal project-modal" id="project-modal">
    <div class="modal__backdrop"></div>
    <div class="modal__content project-modal__content">
      <button class="modal__close">×</button>
      <div id="project-details"></div>
    </div>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/main.js" type="module"></script>
</body>
</html>
