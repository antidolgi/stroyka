<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-config="seo.titleTemplate" data-placeholder="contacts.title">Контакты | Северный Инжиниринг</title>
  <meta name="description" content="Свяжитесь с нами: адрес, телефон, соцсети. Офис в Вологде на ул. Чернышевского, 120Г.">
  <meta property="og:title" content="Контакты | Северный Инжиниринг">
  <meta property="og:description" content="Адрес, телефон и форма связи.">
  <meta property="og:image" data-config="seo.ogImage">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📞</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <!-- GSAP + ScrollTrigger -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
</head>
<body>
  <header id="site-header"></header>

  <main>
    <section class="section page-hero has-video">
  <video class="page-hero__video" autoplay muted loop playsinline poster="assets/img/page-hero-poster.jpg">
    <source src="assets/video/page-hero.webm" type="video/webm">
    <source src="assets/video/page-hero.mp4" type="video/mp4">
  </video>
  <div class="container page-hero__content">
        <h1 class="page-title" data-splitting>Контакты</h1>
        <p class="page-subtitle">Всегда на связи</p>
      </div>
    </section>

    <section class="section contacts-layout">
      <div class="container contacts-grid">
        <div class="contacts-info">
          <h2>Офис в Вологде</h2>
          <p><strong>Адрес:</strong> <span data-config="company.address"></span></p>
          <p><strong>Телефон:</strong> <a href="tel:+CONFIG.company.phoneRaw" data-config="company.phone"></a></p>
          <p><strong>Email:</strong> <a href="mailto:" data-config="company.email"></a></p>
          <p><strong>Режим работы:</strong> <span data-config="company.workingHours"></span></p>
          <div class="social-links">
            <a href="#" data-config="company.social.telegram" target="_blank">Telegram</a>
            <a href="#" data-config="company.social.vk" target="_blank">ВКонтакте</a>
          </div>
        </div>
        <div class="contacts-form-wrapper">
          <h2>Напишите нам</h2>
          <form id="contact-form">
            <input type="text" name="name" placeholder="Ваше имя" required>
            <input type="tel" name="phone" placeholder="Телефон" required>
            <input type="email" name="email" placeholder="Email">
            <textarea name="message" placeholder="Сообщение"></textarea>
            <button type="submit" class="btn btn--primary">Отправить</button>
            <p class="form-status" id="form-status"></p>
          </form>
        </div>
      </div>
    </section>

    <section class="section map-section">
      <div class="container">
        <h2 class="section-title" data-splitting>Мы на карте</h2>
        <div id="leaflet-map" class="map__container"></div>
      </div>
    </section>
  </main>

  <footer id="site-footer"></footer>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/main.js" type="module"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
</body>
</html>
